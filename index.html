<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body, html {
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;
  font-family: sans-serif;
}

/* 封面页 */
#cover {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
  transition: opacity 0.8s ease;
}

#enterBtn {
  margin-top: 20px;
  padding: 12px 24px;
  border: 1px solid #fff;
  border-radius: 30px;
  cursor: pointer;
}

/* 相册 */
.container {
  display: flex;
  width: 100vw;
  height: 100vh;
  overflow-x: scroll;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
}

.container::-webkit-scrollbar {
  display: none;
}

.slide {
  min-width: 100vw;
  height: 100vh;
  scroll-snap-align: center;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0.3;
  transform: scale(0.95);
  transition: all 0.6s ease;
}

.slide.active {
  opacity: 1;
  transform: scale(1);
}

img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

#control {
  position: fixed;
  top: 20px;
  right: 20px;
  font-size: 24px;
  color: white;
  z-index: 999;
}
</style>
</head>

<body>

<!-- 封面 -->
<div id="cover">
  <h2>作品展览</h2>
  <div id="enterBtn">点击进入</div>
</div>

<div id="control">🔊</div>

<audio id="bgm" loop>
  <source src="ghl.mp3" type="audio/mpeg">
</audio>

<div class="container" id="container">

  <div class="slide">
    <img src="01.jpg">
  </div>

  <div class="slide">
    <img src="02.jpg">
  </div>

  <div class="slide">
    <img src="03.jpg">
  </div>

  <div class="slide">
    <img src="04.jpg">
  </div>

  <div class="slide">
    <img src="05.jpg">
  </div>

  <div class="slide">
    <img src="06.jpg">
  </div>

  <div class="slide">
    <img src="07.jpg">
  </div>

  <div class="slide">
    <img src="08.jpg">
  </div>

  <div class="slide">
    <img src="09.jpg">
  </div>

  <div class="slide">
    <img src="10.jpg">
  </div>

  <div class="slide">
    <img src="11.jpg">
  </div>

  <div class="slide">
    <img src="12.jpg">
  </div>

  <div class="slide">
    <img src="13.jpg">
  </div>

  <div class="slide">
    <img src="14.jpg">
  </div>

  <div class="slide">
    <img src="15.jpg">
  </div>

  <div class="slide">
    <img src="16.jpg">
  </div>

  <div class="slide">
    <img src="17.jpg">
  </div>

  <div class="slide">
    <img src="18.jpg">
  </div>

  <div class="slide">
    <img src="19.jpg">
  </div>

  <div class="slide">
    <img src="20.jpg">
  </div>
  
</div>

<script>
const container = document.getElementById('container');
const slides = document.querySelectorAll('.slide');
const audio = document.getElementById('bgm');
const cover = document.getElementById('cover');

let index = 0;
let timer = null;

// 音量（柔和）
audio.volume = 0.1;

// 更新动画状态
function updateActive() {
  slides.forEach((slide, i) => {
    slide.classList.toggle('active', i === index);
  });
}

// 自动轮播（加快）
function startAuto() {
  timer = setInterval(() => {
    index = (index + 1) % slides.length;
    container.scrollTo({
      left: index * window.innerWidth,
      behavior: 'smooth'
    });
    updateActive();
  }, 3000); // ⭐ 调快：3秒
}

// 点击进入
document.getElementById('enterBtn').onclick = () => {
  cover.style.opacity = 0;
  setTimeout(() => cover.style.display = 'none', 800);

  audio.play();
  startAuto();
};

// 手动滑动同步
container.addEventListener('scroll', () => {
  index = Math.round(container.scrollLeft / window.innerWidth);
  updateActive();
});
</script>

</body>
</html>
