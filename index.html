<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body, html {
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;
  font-family: sans-serif;
}

/* 封面（已改成图片） */
#cover {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('01.jpg') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
  transition: opacity 1s ease;
}

/* 封面遮罩 */
#cover::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
}

/* 按钮 */
#enterBtn {
  padding: 12px 28px;
  border: 1px solid #fff;
  border-radius: 30px;
  color: white;
  cursor: pointer;
  z-index: 1;
}

/* 相册容器 */
.container {
  display: flex;
  width: 100vw;
  height: 100vh;
  overflow-x: scroll;
  scroll-behavior: smooth;
}

.container::-webkit-scrollbar {
  display: none;
}

/* 每一页 */
.slide {
  min-width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
}

/* ✅ 展示作品（关键） */
.slide img {
  max-width: 90%;
  max-height: 90%;
  object-fit: contain;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* 控制按钮 */
#control {
  position: fixed;
  top: 20px;
  right: 20px;
  font-size: 24px;
  color: white;
  z-index: 999;
}
</style>
</head>

<body>

<!-- 封面 -->
<div id="cover">
  <h2>荷美中山</h2>
  <div id="enterBtn">点击进入</div>
</div>

<div id="control">🔊</div>

<audio id="bgm" loop>
  <source src="ghl.mp3" type="audio/mpeg">
</audio>

<div class="container" id="container">

  <div class="slide">
    <img src="01.jpg">
  </div>

  <div class="slide">
    <img src="02.jpg">
  </div>

  <div class="slide">
    <img src="03.jpg">
  </div>

  <div class="slide">
    <img src="04.jpg">
  </div>

  <div class="slide">
    <img src="05.jpg">
  </div>

  <div class="slide">
    <img src="06.jpg">
  </div>

  <div class="slide">
    <img src="07.jpg">
  </div>

  <div class="slide">
    <img src="08.jpg">
  </div>

  <div class="slide">
    <img src="09.jpg">
  </div>

  <div class="slide">
    <img src="10.jpg">
  </div>

  <div class="slide">
    <img src="11.jpg">
  </div>

  <div class="slide">
    <img src="12.jpg">
  </div>

  <div class="slide">
    <img src="13.jpg">
  </div>

  <div class="slide">
    <img src="14.jpg">
  </div>

  <div class="slide">
    <img src="15.jpg">
  </div>

  <div class="slide">
    <img src="16.jpg">
  </div>

  <div class="slide">
    <img src="17.jpg">
  </div>

  <div class="slide">
    <img src="18.jpg">
  </div>

  <div class="slide">
    <img src="19.jpg">
  </div>

  <div class="slide">
    <img src="20.jpg">
  </div>
  
</div>

<script>
const container = document.getElementById('container');
const slides = document.querySelectorAll('.slide');
const audio = document.getElementById('bgm');
const cover = document.getElementById('cover');

let index = 0;

// 🎵 音乐渐入
audio.volume = 0;

function fadeInAudio() {
  let v = 0;
  const t = setInterval(() => {
    if (v < 0.2) {
      v += 0.02;
      audio.volume = v;
    } else clearInterval(t);
  }, 200);
}

// 自动轮播
function startAuto() {
  function next() {
    index = (index + 1) % slides.length;

    container.scrollTo({
      left: index * window.innerWidth,
      behavior: 'smooth'
    });

    // 每张停留时间
    setTimeout(next, 5000);
  }

  next();
}

// 点击进入
document.getElementById('enterBtn').onclick = () => {
  cover.style.opacity = 0;
  setTimeout(()=>cover.style.display='none',1000);

  audio.play();
  fadeInAudio();
  startAuto();
};
</script>

</body>
</html>
