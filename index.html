<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body, html {
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;
  font-family: sans-serif;
}

/* 封面 */
#cover {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
  transition: opacity 1s ease;
}

#enterBtn {
  margin-top: 20px;
  padding: 12px 28px;
  border: 1px solid #fff;
  border-radius: 30px;
  cursor: pointer;
}

/* 相册容器 */
.container {
  display: flex;
  width: 100vw;
  height: 100vh;
  overflow-x: scroll;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
}

.container::-webkit-scrollbar {
  display: none;
}

/* 每一页 */
.slide {
  position: relative;
  min-width: 100vw;
  height: 100vh;
  scroll-snap-align: center;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* 图片层（慢慢放大） */
.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scale(1);
  transition: transform 6s ease;
}

/* 当前页放大 */
.slide.active img {
  transform: scale(1.1);
}

/* 视差遮罩层 */
.overlay {
  position: absolute;
  width: 120%;
  height: 120%;
  background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.5));
  pointer-events: none;
}

/* 控制按钮 */
#control {
  position: fixed;
  top: 20px;
  right: 20px;
  font-size: 24px;
  color: white;
  z-index: 999;
}
</style>
</head>

<body>

<!-- 封面 -->
<div id="cover" style="
  background: url('01.jpg') center/cover no-repeat;
">
  <div style="
    position:absolute;
    bottom:80px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    color:white;
  ">
    <div id="enterBtn" style="
      padding:12px 28px;
      border:1px solid #fff;
      border-radius:30px;
    ">
      点击进入
    </div>
  </div>
</div>

<div id="control">🔊</div>

<audio id="bgm" loop>
  <source src="ghl.mp3" type="audio/mpeg">
</audio>

<div class="container" id="container">

  <div class="slide">
    <img src="01.jpg">
  </div>

  <div class="slide">
    <img src="02.jpg">
  </div>

  <div class="slide">
    <img src="03.jpg">
  </div>

  <div class="slide">
    <img src="04.jpg">
  </div>

  <div class="slide">
    <img src="05.jpg">
  </div>

  <div class="slide">
    <img src="06.jpg">
  </div>

  <div class="slide">
    <img src="07.jpg">
  </div>

  <div class="slide">
    <img src="08.jpg">
  </div>

  <div class="slide">
    <img src="09.jpg">
  </div>

  <div class="slide">
    <img src="10.jpg">
  </div>

  <div class="slide">
    <img src="11.jpg">
  </div>

  <div class="slide">
    <img src="12.jpg">
  </div>

  <div class="slide">
    <img src="13.jpg">
  </div>

  <div class="slide">
    <img src="14.jpg">
  </div>

  <div class="slide">
    <img src="15.jpg">
  </div>

  <div class="slide">
    <img src="16.jpg">
  </div>

  <div class="slide">
    <img src="17.jpg">
  </div>

  <div class="slide">
    <img src="18.jpg">
  </div>

  <div class="slide">
    <img src="19.jpg">
  </div>

  <div class="slide">
    <img src="20.jpg">
  </div>
  
</div>

<script>
const container = document.getElementById('container');
const slides = document.querySelectorAll('.slide');
const audio = document.getElementById('bgm');
const cover = document.getElementById('cover');

let index = 0;
let timer = null;

// 🎵 初始音量为0（渐入关键）
audio.volume = 0;

// 🎵 音乐渐入
function fadeInAudio() {
  let vol = 0;
  const fade = setInterval(() => {
    if (vol < 0.2) {
      vol += 0.02;
      audio.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 200);
}

// 更新激活页
function updateActive() {
  slides.forEach((slide, i) => {
    slide.classList.toggle('active', i === index);
  });
}

// 自动轮播（节奏更像Apple）
function startAuto() {
  timer = setInterval(() => {
    index = (index + 1) % slides.length;
    container.scrollTo({
      left: index * window.innerWidth,
      behavior: 'smooth'
    });
    updateActive();
  }, 3000);
}

// ✨ 视差效果
container.addEventListener('scroll', () => {
  const scrollLeft = container.scrollLeft;

  slides.forEach((slide, i) => {
    const offset = i * window.innerWidth - scrollLeft;
    const img = slide.querySelector('img');

    // 轻微视差移动
    img.style.transform = `scale(${i === index ? 1.1 : 1}) translateX(${offset * 0.05}px)`;
  });

  index = Math.round(scrollLeft / window.innerWidth);
  updateActive();
});

// 点击进入
document.getElementById('enterBtn').onclick = () => {
  cover.style.opacity = 0;
  setTimeout(() => cover.style.display = 'none', 1000);

  audio.play();
  fadeInAudio(); // 🎵 渐入
  startAuto();
};
</script>

</body>
</html>
</body>
</html>
