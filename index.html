<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body, html {
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;
  font-family: sans-serif;
}

.container {
  display: flex;
  width: 100vw;
  height: 100vh;
  overflow-x: scroll;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
}

/* 隐藏滚动条（更像苹果） */
.container::-webkit-scrollbar {
  display: none;
}

.slide {
  min-width: 100vw;
  height: 100vh;
  scroll-snap-align: center;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0.3;
  transform: scale(0.95);
  transition: all 0.8s ease; /* 丝滑关键 */
}

.slide.active {
  opacity: 1;
  transform: scale(1);
}

img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  transition: transform 1s ease;
}

/* 控制按钮 */
#control {
  position: fixed;
  top: 20px;
  right: 20px;
  font-size: 26px;
  color: white;
  z-index: 999;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="control">▶️</div>

<audio id="bgm" loop>
  <source src="ghl.mp3" type="audio/mpeg">
</audio>

<div class="container" id="container">

  <div class="slide">
    <img src="01.jpg">
  </div>

  <div class="slide">
    <img src="02.jpg">
  </div>

  <div class="slide">
    <img src="03.jpg">
  </div>

  <div class="slide">
    <img src="04.jpg">
  </div>

  <div class="slide">
    <img src="05.jpg">
  </div>

  <div class="slide">
    <img src="06.jpg">
  </div>

  <div class="slide">
    <img src="07.jpg">
  </div>

  <div class="slide">
    <img src="08.jpg">
  </div>

  <div class="slide">
    <img src="09.jpg">
  </div>

  <div class="slide">
    <img src="10.jpg">
  </div>

  <div class="slide">
    <img src="11.jpg">
  </div>

  <div class="slide">
    <img src="12.jpg">
  </div>

  <div class="slide">
    <img src="13.jpg">
  </div>

  <div class="slide">
    <img src="14.jpg">
  </div>

  <div class="slide">
    <img src="15.jpg">
  </div>

  <div class="slide">
    <img src="16.jpg">
  </div>

  <div class="slide">
    <img src="17.jpg">
  </div>

  <div class="slide">
    <img src="18.jpg">
  </div>

  <div class="slide">
    <img src="19.jpg">
  </div>

  <div class="slide">
    <img src="20.jpg">
  </div>
  
</div>

<script>
const container = document.getElementById('container');
const slides = document.querySelectorAll('.slide');
const audio = document.getElementById('bgm');
const btn = document.getElementById('control');

let index = 0;
let playing = false;
let timer = null;

// 🎵 设置音量（重点）
audio.volume = 0.1; // 0.0 ~ 1.0（0.2 = 很轻柔）

// 切换激活状态（动画关键）
function updateActive() {
  slides.forEach((slide, i) => {
    slide.classList.toggle('active', i === index);
  });
}

// 自动轮播
function startAuto() {
  timer = setInterval(() => {
    index = (index + 1) % slides.length;
    container.scrollTo({
      left: index * window.innerWidth,
      behavior: 'smooth'
    });
    updateActive();
  }, 6000); // 慢一点更高级
}

// 停止轮播
function stopAuto() {
  clearInterval(timer);
}

// 控制按钮
btn.onclick = () => {
  playing = !playing;

  if (playing) {
    btn.innerHTML = '⏸️';
    audio.play();
    startAuto();
  } else {
    btn.innerHTML = '▶️';
    audio.pause();
    stopAuto();
  }
};

// 微信限制：首次点击触发
document.body.addEventListener('click', () => {
  if (!playing) {
    playing = true;
    btn.innerHTML = '⏸️';
    audio.play();
    startAuto();
  }
}, { once: true });

// 手动滑动同步动画
container.addEventListener('scroll', () => {
  index = Math.round(container.scrollLeft / window.innerWidth);
  updateActive();
});
</script>

</body>
</html>
</html>
