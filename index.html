<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body, html {
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;
}

/* 封面 */
#cover {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('你的封面.jpg') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  z-index: 9999;
}

#enterBtn {
  margin-bottom: 80px;
  padding: 12px 28px;
  border: 1px solid #fff;
  border-radius: 30px;
  color: white;
  animation: pulse 2s infinite;
}

/* 滚动区 */
.container {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.section {
  height: 100vh;
  position: relative;
  overflow: hidden;
  scroll-snap-align: start;
}

/* 图片 */
.section img {
  position: absolute;
  width: 110%;
  height: 110%;
  object-fit: cover;
  top: -5%;
  left: -5%;
  transform: scale(1);
  transition: transform 0.2s linear;
}

/* 遮罩渐变 */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.6));
}

/* 动画 */
@keyframes pulse {
  0% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.08); }
  100% { opacity: 0.6; transform: scale(1); }
}
</style>
</head>

<body>

<!-- 封面 -->
<div id="cover" style="
  background: url('01.jpg') center/cover no-repeat;
  position:relative;
">
  <div style="
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.3);
  "></div>

  <div style="
    position:absolute;
    bottom:80px;
    left:50%;
    transform:translateX(-50%);
    color:white;
  ">
    <div id="enterBtn">点击进入</div>
  </div>
</div>

<div id="control">🔊</div>

<audio id="bgm" loop>
  <source src="ghl.mp3" type="audio/mpeg">
</audio>

<div class="container" id="container">

  <div class="slide">

<script>
const container = document.getElementById('container');
const sections = document.querySelectorAll('.section');
const audio = document.getElementById('bgm');
const cover = document.getElementById('cover');

// 音乐渐入
audio.volume = 0;

function fadeInAudio() {
  let v = 0;
  const t = setInterval(() => {
    if (v < 0.2) {
      v += 0.02;
      audio.volume = v;
    } else clearInterval(t);
  }, 200);
}

// 点击进入
document.getElementById('enterBtn').onclick = () => {
  cover.style.opacity = 0;
  setTimeout(()=>cover.style.display='none',1000);

  audio.play();
  fadeInAudio();
};

// 滚动驱动动画（核心）
container.addEventListener('scroll', () => {
  const scrollTop = container.scrollTop;

  sections.forEach((sec, i) => {
    const img = sec.querySelector('img');
    const offset = sec.offsetTop - scrollTop;

    // 🟢 Apple核心：根据位置动态变化
    const scale = 1 + Math.max(0, 1 - Math.abs(offset / window.innerHeight)) * 0.15;
    const translateY = offset * 0.1;

    img.style.transform = `scale(${scale}) translateY(${translateY}px)`;
  });
});
</script>
